<!DOCTYPE html>

<html>

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Internship Application Form</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<body>
	<!-- the entire body must be written by student -->
	<h4 style="text-align:center;"> Internship Form</h4>
	<form class="needs-validation" novalidate>
		<div class="row">
			<div class="col">
				<label for ="first-name-input" >First Name</label>
	            <input type="text" id="first-name-input" class="form-control" required>
				<div class="invalid-feedback">Please provide a valid first name.</div>
			</div>

			<div class="col">
				<label for="last-name-input">Last Name</label>
				<input type="text" id="last-name-input" class="form-control" required>
				<div class="invalid-feedback">Please provide a valid last name</div>
			</div>
            <div class="col">
				<label for="email-input">Email</label>
			    <input type="email" id="email-input" class="form-control" required>
				<div class="invalid-feedback">Please provide a valid email</div>
			</div>
		</div>
		</div>
			<div class="row">
				<div class="col">
					<label for="college-input">College Input</label>
					<input type="text" id="college-input" class="form-control" required>
					<div class="invalid-feedback">Please provide a valid college name</div>
				</div>

		

			
				<div class="col">
					<label for="grad-year-select">Graduation Year</label>
					<select id="grad-year-select" class="form-control" required>
						<option value="selected disabled">Choose...</option>
						<option vlaue="2020">2020</option>
						<option value="2021">2021</option>
						<option vlaue="2022">2022</option>
						<option value="2023">2023</option>
					</select>
					<div class="invalid-feedback">please select a graduation year.</div>
				</div>
				<div class="col">
					<label for="roll-no-input">Roll No</label>
					<input type="text" id="roll-no-input" class="form-control" required>
					<div class="invalid-feedback">please provide a valid roll no</div>
				</div>
			</div>


			<div class="form-check">
				<input type="checkbox" id="conditions-checkbox" class="form-check-input" required>
				<label class="form-check-label" for="conditions-checkbox">
					Agree to the terms and conditons
					
					You must agree before submitting.
				</label>
				
			</div>
			<button type="submit" class="btn btn-primary">submit form</button>
		</form>
						
							

</body>

</html>
